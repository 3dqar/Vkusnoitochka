<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS40 — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan:   #00f5ff;
    --neon-purple: #bf00ff;
    --neon-pink:   #ff0080;
    --neon-red:    #ff2040;
    --neon-green:  #00ff99;
    --bg-deep:     #020408;
    --text-dim:    rgba(255,255,255,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Rajdhani', sans-serif; background: var(--bg-deep); color: #fff; min-height: 100vh; }

  /* LOGIN */
  #loginScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 20px; padding: 20px;
  }
  .login-title { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 900; letter-spacing: 0.2em; color: var(--neon-cyan); filter: drop-shadow(0 0 12px var(--neon-cyan)); }
  .login-sub { font-size: 0.8rem; letter-spacing: 0.2em; color: var(--text-dim); }
  #pwInput {
    font-family: 'Orbitron', monospace; font-size: 0.9rem; letter-spacing: 0.2em; text-align: center;
    background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.3);
    color: #fff; padding: 12px 24px; border-radius: 100px; outline: none; width: 280px;
  }
  #pwInput:focus { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,245,255,0.2); }
  .login-btn {
    font-family: 'Orbitron', monospace; font-size: 0.75rem; letter-spacing: 0.25em;
    color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
    background: transparent; padding: 10px 32px; border-radius: 100px;
    cursor: pointer; transition: all 0.3s;
  }
  .login-btn:hover { background: rgba(0,245,255,0.1); filter: drop-shadow(0 0 10px var(--neon-cyan)); }
  #loginError { color: var(--neon-red); font-size: 0.75rem; letter-spacing: 0.2em; min-height: 18px; }

  /* ADMIN PANEL */
  #adminPanel { display: none; max-width: 800px; margin: 0 auto; padding: 30px 20px 80px; }

  .admin-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; }
  .admin-title { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 900; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.1em; }
  .header-btns { display: flex; gap: 10px; flex-wrap: wrap; }

  .back-btn {
    font-family: 'Orbitron', monospace; font-size: 0.65rem; letter-spacing: 0.2em;
    color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1);
    background: transparent; padding: 8px 18px; border-radius: 100px;
    cursor: pointer; text-decoration: none; transition: all 0.3s;
  }
  .back-btn:hover { color: var(--neon-cyan); border-color: rgba(0,245,255,0.3); }

  .save-btn {
    font-family: 'Orbitron', monospace; font-size: 0.7rem; letter-spacing: 0.2em;
    color: #000; background: var(--neon-cyan); border: none;
    padding: 9px 24px; border-radius: 100px; cursor: pointer; transition: all 0.3s;
    font-weight: 700;
  }
  .save-btn:hover { filter: drop-shadow(0 0 12px var(--neon-cyan)); transform: scale(1.03); }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-msg { font-family: 'Orbitron', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-align: center; min-height: 20px; margin-bottom: 16px; }
  .status-msg.ok    { color: var(--neon-green); filter: drop-shadow(0 0 6px var(--neon-green)); }
  .status-msg.err   { color: var(--neon-red); }
  .status-msg.info  { color: var(--text-dim); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* TABLE */
  .table-wrap { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,245,255,0.1); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
  .table-head { display: grid; grid-template-columns: 40px 1fr 120px 44px; gap: 0; background: rgba(0,245,255,0.05); border-bottom: 1px solid rgba(0,245,255,0.1); padding: 12px 16px; }
  .th { font-family: 'Orbitron', monospace; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; }

  .flavour-row { display: grid; grid-template-columns: 40px 1fr 120px 44px; gap: 0; align-items: center; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.2s; }
  .flavour-row:last-child { border-bottom: none; }
  .flavour-row:hover { background: rgba(255,255,255,0.02); }
  .row-num { font-family: 'Orbitron', monospace; font-size: 0.6rem; color: var(--text-dim); }

  .name-input, .qty-input {
    background: transparent; border: 1px solid transparent;
    color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 600;
    padding: 6px 10px; border-radius: 8px; outline: none; transition: all 0.2s; width: 100%;
  }
  .name-input:focus, .qty-input:focus { border-color: rgba(0,245,255,0.3); background: rgba(0,245,255,0.04); }
  .qty-input { font-family: 'Orbitron', monospace; font-size: 0.85rem; text-align: center; width: 80px; }
  .qty-input.zero { color: rgba(255,255,255,0.3); }
  .qty-input.low  { color: var(--neon-red); }
  .qty-input.ok   { color: var(--neon-green); }

  .del-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(255,32,64,0.25); background: transparent; color: rgba(255,32,64,0.5); font-size: 1rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .del-btn:hover { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,32,64,0.08); }

  /* ADD ROW */
  .add-row { display: flex; gap: 10px; align-items: center; padding: 16px; flex-wrap: wrap; }
  .add-name { flex: 1; min-width: 160px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; padding: 9px 14px; border-radius: 10px; outline: none; transition: all 0.2s; }
  .add-name:focus { border-color: rgba(0,245,255,0.3); background: rgba(0,245,255,0.04); }
  .add-name::placeholder { color: rgba(255,255,255,0.2); }
  .add-qty { width: 80px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #fff; font-family: 'Orbitron', monospace; font-size: 0.85rem; text-align: center; padding: 9px 8px; border-radius: 10px; outline: none; transition: all 0.2s; }
  .add-qty:focus { border-color: rgba(0,245,255,0.3); }
  .add-btn { font-family: 'Orbitron', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--neon-purple); border: 1px solid rgba(191,0,255,0.4); background: rgba(191,0,255,0.06); padding: 9px 20px; border-radius: 100px; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
  .add-btn:hover { background: rgba(191,0,255,0.14); filter: drop-shadow(0 0 8px var(--neon-purple)); }

  .hint { font-size: 0.72rem; letter-spacing: 0.12em; color: var(--text-dim); text-align: center; padding: 0 16px 16px; line-height: 1.6; }
  .hint a { color: var(--neon-cyan); text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-title">NS40 ADMIN</div>
  <div class="login-sub">ĮVESK SLAPTAŽODĮ</div>
  <input id="pwInput" type="password" placeholder="••••••••" autocomplete="current-password" />
  <button class="login-btn" id="loginBtn">PRISIJUNGTI</button>
  <div id="loginError"></div>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-title">◈ NS40 ADMIN ◈</div>
    <div class="header-btns">
      <a href="index.html" class="back-btn">← PUSLAPIS</a>
      <button class="save-btn" id="saveBtn">💾 IŠSAUGOTI</button>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="th">#</div>
      <div class="th">Pavadinimas</div>
      <div class="th" style="text-align:center">Kiekis</div>
      <div class="th"></div>
    </div>
    <div id="rowsContainer"></div>
    <div class="add-row">
      <input class="add-name" id="addName" type="text" placeholder="Naujas skonis..." maxlength="60" />
      <input class="add-qty"  id="addQty"  type="number" min="0" max="999" value="0" />
      <button class="add-btn" id="addBtn">+ PRIDĖTI</button>
    </div>
  </div>

  <div class="hint">
    Pakeitimai išsaugomi tiesiai į tavo
    <a href="https://docs.google.com/spreadsheets/d/13rcjuyYF0pMCZJvFNtRLQECkv873dqIlAsR81G4ubMY" target="_blank">Google Sheet</a>
    per API. Puslapis atnaujinamas automatiškai.
  </div>
</div>

<script>
/* ── CONFIG ── */
const SHEET_ID  = '13rcjuyYF0pMCZJvFNtRLQECkv873dqIlAsR81G4ubMY';
const ADMIN_PW  = 'ns40admin'; // ← pakeisk slaptažodį čia

/* ── LOGIN ── */
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });

function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'block';
    loadData();
  } else {
    document.getElementById('loginError').textContent = '⚠ Neteisingas slaptažodis';
    document.getElementById('pwInput').value = '';
  }
}

/* ── DATA ── */
let rows = []; // [{name, qty}]

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  if (lines.length < 2) return [];
  return lines.slice(1).map(line => {
    const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || line.split(',');
    const name = (cols[0]||'').replace(/"/g,'').trim();
    const qty  = parseInt((cols[1]||'0').replace(/"/g,'').trim(), 10) || 0;
    return name ? {name, qty} : null;
  }).filter(Boolean);
}

async function loadData() {
  setStatus('Kraunama...', 'info');
  try {
    const res  = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`);
    const text = await res.text();
    rows = parseCSV(text);
    renderRows();
    setStatus('✓ Duomenys įkelti', 'ok');
    setTimeout(()=>setStatus('',''), 2000);
  } catch(e) {
    setStatus('⚠ Nepavyko įkelti — patikrink ar Sheet\'as viešas', 'err');
  }
}

/* ── RENDER ROWS ── */
function renderRows() {
  const container = document.getElementById('rowsContainer');
  container.innerHTML = rows.map((r, i) => `
    <div class="flavour-row" id="row-${i}">
      <div class="row-num">${i+1}</div>
      <input class="name-input" data-i="${i}" data-field="name" value="${escHtml(r.name)}" maxlength="60" />
      <input class="qty-input ${qtyClass(r.qty)}" data-i="${i}" data-field="qty" type="number" min="0" max="999" value="${r.qty}" />
      <button class="del-btn" data-i="${i}" title="Ištrinti">×</button>
    </div>`).join('');

  container.querySelectorAll('.name-input').forEach(el => el.addEventListener('input', onFieldChange));
  container.querySelectorAll('.qty-input').forEach(el  => el.addEventListener('input', onFieldChange));
  container.querySelectorAll('.del-btn').forEach(el    => el.addEventListener('click', onDelete));
}

function onFieldChange(e) {
  const i     = parseInt(e.target.dataset.i);
  const field = e.target.dataset.field;
  if (field === 'name') { rows[i].name = e.target.value; }
  if (field === 'qty')  {
    rows[i].qty = parseInt(e.target.value, 10) || 0;
    e.target.className = 'qty-input ' + qtyClass(rows[i].qty);
  }
}

function onDelete(e) {
  const i = parseInt(e.target.dataset.i);
  if (confirm(`Ištrinti "${rows[i].name}"?`)) {
    rows.splice(i, 1);
    renderRows();
  }
}

function qtyClass(qty) { return qty===0?'zero':qty<=2?'low':'ok'; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ── ADD ── */
document.getElementById('addBtn').addEventListener('click', () => {
  const name = document.getElementById('addName').value.trim();
  const qty  = parseInt(document.getElementById('addQty').value, 10) || 0;
  if (!name) { document.getElementById('addName').focus(); return; }
  rows.push({ name, qty });
  renderRows();
  document.getElementById('addName').value = '';
  document.getElementById('addQty').value  = '0';
  document.getElementById('addName').focus();
});
document.getElementById('addName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

/* ── SAVE via Google Sheets API ── */
document.getElementById('saveBtn').addEventListener('click', saveData);

async function saveData() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  setStatus('Saugojama...', 'info');

  // Build CSV
  const csv = 'Pavadinimas,Kiekis\n' + rows.map(r => `"${r.name.replace(/"/g,'""')}",${r.qty}`).join('\n');

  // We use the Apps Script Web App approach
  // Since direct Sheets API needs OAuth, we'll use a public Google Apps Script
  // The user needs to deploy their own Apps Script — we'll guide them
  // For now, download CSV and open Sheet
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'ns40_skoniai.csv';
  a.click(); URL.revokeObjectURL(url);

  setStatus('✓ CSV atsisiųstas! Importuok į Google Sheets: Failas → Importuoti', 'ok');
  btn.disabled = false;
}

function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + (type||'');
}
</script>
</body>
</html>
