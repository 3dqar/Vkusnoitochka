<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarašiukas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
            color: white;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #loading-screen.fade-out {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }

        .loading-animation {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
        }

        .vapor-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #00f5ff;
            border-right-color: #ff00ff;
            transform: translate(-50%, -50%);
            animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .vapor-circle:nth-child(2) {
            width: 80%;
            height: 80%;
            border-top-color: #ff00ff;
            border-right-color: #00ff88;
            animation-duration: 1.5s;
            animation-direction: reverse;
        }

        .vapor-circle:nth-child(3) {
            width: 60%;
            height: 60%;
            border-top-color: #00ff88;
            border-right-color: #ffaa00;
            animation-duration: 1s;
        }

        .vapor-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.4), transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-glow 2s ease-in-out infinite;
            filter: blur(20px);
        }

        @keyframes spin {
            0% { 
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) rotate(180deg) scale(1.1);
            }
            100% { 
                transform: translate(-50%, -50%) rotate(360deg) scale(1);
            }
        }

        @keyframes pulse-glow {
            0%, 100% { 
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        .loading-text {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88, #ffaa00);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite, float-text 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float-text {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Main Page */
        #main-page {
            opacity: 0;
            transform: scale(0.9);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            min-height: 100vh;
            padding: 60px 20px;
        }

        #main-page.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .vapor-particle {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.1), transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: float-particle 20s infinite;
            opacity: 0.6;
        }

        .vapor-particle:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-duration: 15s;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.1), transparent 70%);
        }

        .vapor-particle:nth-child(2) {
            top: 50%;
            right: 10%;
            animation-duration: 18s;
            animation-delay: 2s;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1), transparent 70%);
        }

        .vapor-particle:nth-child(3) {
            bottom: 10%;
            left: 30%;
            animation-duration: 22s;
            animation-delay: 4s;
            background: radial-gradient(circle, rgba(255, 170, 0, 0.1), transparent 70%);
        }

        .vapor-particle:nth-child(4) {
            top: 30%;
            left: 50%;
            animation-duration: 17s;
            animation-delay: 1s;
        }

        @keyframes float-particle {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(50px, -100px) rotate(120deg);
            }
            66% {
                transform: translate(-50px, 50px) rotate(240deg);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 80px;
            position: relative;
        }

        .header h1 {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 50%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: title-glow 3s ease-in-out infinite;
            text-shadow: 0 0 50px rgba(0, 245, 255, 0.5);
            letter-spacing: 2px;
        }

        @keyframes title-glow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.8)) 
                        drop-shadow(0 0 40px rgba(255, 0, 255, 0.6));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(0, 245, 255, 1)) 
                        drop-shadow(0 0 60px rgba(255, 0, 255, 0.8));
            }
        }

        .header p {
            font-size: 24px;
            color: #aaa;
            letter-spacing: 4px;
            font-weight: 300;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Product Card */
        .product-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.8) 0%, rgba(15, 15, 25, 0.9) 100%);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 
                0 20px 60px rgba(0, 245, 255, 0.2),
                0 0 100px rgba(255, 0, 255, 0.1),
                inset 0 0 80px rgba(0, 245, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.3);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 30px 80px rgba(0, 245, 255, 0.3),
                0 0 120px rgba(255, 0, 255, 0.2),
                inset 0 0 100px rgba(0, 245, 255, 0.08);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(0, 245, 255, 0.2);
        }

        .product-name {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .product-price {
            font-size: 48px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            animation: price-pulse 2s ease-in-out infinite;
        }

        @keyframes price-pulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            }
            50% {
                transform: scale(1.05);
                text-shadow: 0 0 30px rgba(0, 255, 136, 0.8), 0 0 50px rgba(0, 255, 136, 0.4);
            }
        }

        /* Flavours Grid */
        .flavours-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .flavour-item {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(255, 0, 255, 0.05));
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .flavour-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 245, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
        }

        .flavour-item:hover::before {
            left: 100%;
        }

        .flavour-item:hover {
            transform: translateX(10px);
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(255, 0, 255, 0.1));
            box-shadow: 
                0 10px 30px rgba(0, 245, 255, 0.3),
                inset 0 0 20px rgba(0, 245, 255, 0.1);
            border-color: rgba(0, 245, 255, 0.5);
        }

        .flavour-number {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 40px;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            animation: number-spin 3s ease-in-out infinite;
        }

        @keyframes number-spin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }

        .flavour-name {
            font-size: 16px;
            color: #fff;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Decorative Elements */
        .vapor-cloud {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.15), transparent 60%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        .vapor-cloud-1 {
            top: -200px;
            right: -200px;
            animation: float-cloud 15s ease-in-out infinite;
        }

        .vapor-cloud-2 {
            bottom: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.15), transparent 60%);
            animation: float-cloud 12s ease-in-out infinite reverse;
        }

        @keyframes float-cloud {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(50px, -50px) scale(1.2);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 42px;
            }

            .product-name {
                font-size: 32px;
            }

            .product-price {
                font-size: 36px;
            }

            .product-card {
                padding: 30px;
            }

            .flavours-grid {
                grid-template-columns: 1fr;
            }

            .loading-text {
                font-size: 24px;
            }
        }

        /* Sparkle Effect */
        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #00f5ff;
            animation: sparkle 2s infinite;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-animation">
            <div class="vapor-glow"></div>
            <div class="vapor-circle"></div>
            <div class="vapor-circle"></div>
            <div class="vapor-circle"></div>
        </div>
        <div class="loading-text">Kraunami skoniai</div>
    </div>

    <!-- Main Page -->
    <div id="main-page">
        <!-- Animated Background -->
        <div class="bg-animation">
            <div class="vapor-particle"></div>
            <div class="vapor-particle"></div>
            <div class="vapor-particle"></div>
            <div class="vapor-particle"></div>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>Vkusna i tochka</h1>
            <p>Premium Skysčiai</p>
        </div>

        <!-- Product Card -->
        <div class="container">
            <div class="product-card">
                <div class="vapor-cloud vapor-cloud-1"></div>
                <div class="vapor-cloud vapor-cloud-2"></div>
                
                <div class="product-header">
                    <div class="product-name">NS40 - 10ML</div>
                    <div class="product-price">3.50€</div>
                </div>

                <div class="flavours-grid" id="flavours-container">
                    <!-- Skoniai bus automatiškai sugeneruoti iš JavaScript masyvo -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // SKONIŲ SĄRAŠAS - REDAGUOK ČIA!
        // Tiesiog pridėk arba pašalink skonius šiame masyve
        // Numeriai automatiškai perskaičiuojami
        // ========================================
        const flavours = [
            "Pitaja su jackfrutu 4",
            "Nebera..",
            "Persikas su ličiais 1",
            "Raudonų uogų miksas su šaltuku 3",
            "Nebera...",
            "Ananasas su citrina/laimu ir šaltuku 3",
            "Braškė su aviete 2",
            "Braškė su kiviu 2",
            "Kramtomoji guma 5",
            "Nebera...",
            "Nebera...",
            "Šaldantis juodųjų serbentų ir aviečių derinys 3",
            "Miško uogų miksas 2",
            "Tamsios uogos (vyšnios, serbentai) 4",
            "Nebera...",
            "Nebera..."
        ];

        // Automatiškai sugeneruoja skonius su numeriais
        function generateFlavours() {
            const container = document.getElementById('flavours-container');
            container.innerHTML = '';
            
            flavours.forEach((flavour, index) => {
                const flavourItem = document.createElement('div');
                flavourItem.className = 'flavour-item';
                flavourItem.innerHTML = `
                    <span class="flavour-number">${index + 1}</span>
                    <span class="flavour-name">${flavour}</span>
                `;
                container.appendChild(flavourItem);
                
                // Add hover effects
                flavourItem.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateX(10px) scale(1.05) rotateZ(' + (Math.random() * 4 - 2) + 'deg)';
                });
                flavourItem.addEventListener('mouseleave', function() {
                    this.style.transform = '';
                });
            });
        }

        // Loading screen animation
        window.addEventListener('load', () => {
            generateFlavours(); // Generuoja skonius
            
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('main-page').classList.add('show');
                    createSparkles();
                }, 500);
            }, 3000);
        });

        // Create random sparkle effects
        function createSparkles() {
            setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                document.querySelector('.bg-animation').appendChild(sparkle);

                setTimeout(() => sparkle.remove(), 2000);
            }, 500);
        }
    </script>
</body>
</html>
